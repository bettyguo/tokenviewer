<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Compare how LLM tokenizers segment the same text, side by side, in your browser."
    />
    <meta name="color-scheme" content="dark light" />
    <title>tokenviewer — compare LLM tokenizers</title>

    <!-- Social preview. og-image.png ships in public/; crawlers resolve it
         against the page URL. Replace with a 1200x630 card if desired. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="tokenviewer — compare LLM tokenizers" />
    <meta
      property="og:description"
      content="See how 7 LLM tokenizers segment the same text, side by side, with cross-tokenizer efficiency analysis. Runs entirely in your browser."
    />
    <meta property="og:image" content="og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="tokenviewer — compare LLM tokenizers" />
    <meta
      name="twitter:description"
      content="See how 7 LLM tokenizers segment the same text, side by side. Runs entirely in your browser — no text leaves the page."
    />
    <meta name="twitter:image" content="og-image.png" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        const t = localStorage.getItem('tokenviewer-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) {
        /* localStorage unavailable; keep default */
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
