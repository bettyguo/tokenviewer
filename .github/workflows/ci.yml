name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache tokenizer assets
        uses: actions/cache@v4
        with:
          path: public/tokenizers
          # Bust the cache whenever the fetch list (the URL/repo pinning)
          # changes; warm hits are no-ops because the fetch script skips
          # files that already exist.
          key: tokenizers-${{ hashFiles('scripts/fetch_tokenizers.mjs') }}

      - name: Fetch tokenizer + font assets
        run: npm run setup

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -d dist/assets
          test -d dist/tokenizers
          test -d dist/fonts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Serve dist/ at the same subpath GitHub Pages will (/tokenviewer/) so
      # this test exercises real deploy conditions, not just root-relative.
      - name: Run subpath Pages emulator
        run: node scripts/pages_serve.mjs &
        env:
          PAGES_PORT: 4173
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4173/tokenviewer/ > /dev/null; then
              echo "server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server never came up"
          exit 1

      - name: Smoke test against /tokenviewer/ (Pages-shape URL)
        run: npm run smoke
        env:
          SMOKE_URL: http://localhost:4173/tokenviewer/

      - name: Upload smoke screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: docs/screenshots/
